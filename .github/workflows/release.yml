name: Release

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # -----------------------------------------------------------
  # Job 1: Determine version, tag, and create GitHub Release
  # -----------------------------------------------------------
  release:
    runs-on: ubuntu-latest
    if: github.repository == 'jsell-rh/k-extract'

    permissions:
      contents: write
      id-token: write

    outputs:
      released: ${{ steps.semrel.outputs.released }}
      version: ${{ steps.semrel.outputs.version }}
      tag: ${{ steps.semrel.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Git credentials
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Python Semantic Release
        id: semrel
        uses: python-semantic-release/python-semantic-release@v10
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          root_options: "-vv"

  # -----------------------------------------------------------
  # Job 2: Build distribution artifacts
  # -----------------------------------------------------------
  build:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout released tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Build package
        run: uv build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  # -----------------------------------------------------------
  # Job 3: Publish to PyPI using OIDC Trusted Publishing
  # -----------------------------------------------------------
  publish-pypi:
    needs: [release, build]
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/project/k-extract/${{ needs.release.outputs.version }}/

    permissions:
      id-token: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # -----------------------------------------------------------
  # Job 4: Upload artifacts to the GitHub Release
  # -----------------------------------------------------------
  publish-github-release:
    needs: [release, build]
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Upload to GitHub Release
        uses: python-semantic-release/publish-action@v10
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ needs.release.outputs.tag }}
